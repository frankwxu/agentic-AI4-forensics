<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 560" role="img" aria-labelledby="title desc">
  <title id="title">Agentic AI4 Forensics Labs cover banner</title>
  <desc id="desc">A student-friendly digital forensics banner with evidence cards, workflow links, and cybersecurity accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6f0e7"/>
      <stop offset="45%" stop-color="#f2efe9"/>
      <stop offset="100%" stop-color="#d9e6e2"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#103847"/>
      <stop offset="100%" stop-color="#1a5965"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf8ee"/>
      <stop offset="100%" stop-color="#f4ecdc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef8c4d"/>
      <stop offset="100%" stop-color="#d7562f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#12333b" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#d8ddd6" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="560" fill="url(#bg)"/>
  <rect width="1600" height="560" fill="url(#grid)" opacity="0.45"/>

  <circle cx="1370" cy="110" r="180" fill="#a8c6bb" opacity="0.28"/>
  <circle cx="152" cy="482" r="122" fill="#efc4a6" opacity="0.34"/>
  <path d="M 0 470 C 220 390 380 520 590 455 S 930 340 1170 430 S 1420 530 1600 455 L 1600 560 L 0 560 Z" fill="#b8d1c8" opacity="0.42"/>

  <g filter="url(#shadow)">
    <rect x="88" y="78" width="760" height="404" rx="34" fill="url(#panel)"/>
    <rect x="88" y="78" width="760" height="404" rx="34" fill="none" stroke="#e9dfcf" stroke-width="2" opacity="0.35"/>
  </g>

  <rect x="126" y="120" width="144" height="32" rx="16" fill="#f0c674"/>
  <text x="198" y="141" fill="#103847" font-family="'Courier New', monospace" font-size="18" text-anchor="middle" letter-spacing="2">CASE FILE</text>

  <text x="126" y="222" fill="#f8f2e7" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700">Agentic AI4</text>
  <text x="126" y="294" fill="#f8f2e7" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700">Forensics Labs</text>
  <text x="128" y="348" fill="#d6e4de" font-family="Verdana, Geneva, sans-serif" font-size="28">Cybersecurity and digital forensics tutorials</text>
  <text x="128" y="387" fill="#d6e4de" font-family="Verdana, Geneva, sans-serif" font-size="28">for students with little or no CS background</text>

  <g transform="translate(126 430)">
    <rect x="0" y="0" width="170" height="16" rx="8" fill="#ef8c4d"/>
    <rect x="190" y="0" width="130" height="16" rx="8" fill="#7fb3a2"/>
    <rect x="338" y="0" width="152" height="16" rx="8" fill="#f0c674"/>
    <rect x="0" y="30" width="490" height="8" rx="4" fill="#8eb1aa" opacity="0.45"/>
  </g>

  <g transform="translate(944 68)">
    <g filter="url(#shadow)">
      <rect x="42" y="54" width="420" height="428" rx="26" fill="#f8f2e7"/>
      <rect x="42" y="54" width="420" height="428" rx="26" fill="none" stroke="#d8c4ab" stroke-width="2"/>
    </g>

    <rect x="84" y="94" width="160" height="22" rx="11" fill="#113947"/>
    <text x="164" y="110" fill="#f6efe4" font-family="'Courier New', monospace" font-size="14" text-anchor="middle" letter-spacing="1.5">INVESTIGATION BOARD</text>

    <path d="M 250 150 C 325 175 356 205 390 270" fill="none" stroke="#ef8c4d" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10"/>
    <path d="M 156 245 C 220 255 252 270 286 330" fill="none" stroke="#7ea797" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10"/>
    <path d="M 340 330 C 312 364 252 393 172 404" fill="none" stroke="#103847" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" opacity="0.6"/>

    <circle cx="248" cy="150" r="10" fill="#ef8c4d"/>
    <circle cx="154" cy="244" r="10" fill="#7ea797"/>
    <circle cx="290" cy="330" r="10" fill="#103847"/>
    <circle cx="170" cy="404" r="10" fill="#f0c674"/>

    <g transform="rotate(-4 170 190)">
      <rect x="92" y="128" width="190" height="118" rx="18" fill="url(#card)"/>
      <rect x="92" y="128" width="190" height="118" rx="18" fill="none" stroke="#d2c0a8" stroke-width="2"/>
      <rect x="110" y="146" width="76" height="18" rx="9" fill="url(#accent)"/>
      <text x="110" y="186" fill="#163842" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700">Artifacts</text>
      <text x="110" y="214" fill="#4d6660" font-family="'Courier New', monospace" font-size="17">images | logs | metadata</text>
    </g>

    <g transform="rotate(3 345 275)">
      <rect x="254" y="206" width="170" height="124" rx="18" fill="url(#card)"/>
      <rect x="254" y="206" width="170" height="124" rx="18" fill="none" stroke="#d2c0a8" stroke-width="2"/>
      <rect x="272" y="224" width="72" height="18" rx="9" fill="#7ea797"/>
      <text x="272" y="265" fill="#163842" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700">Timeline</text>
      <path d="M 274 287 H 396" stroke="#dd8352" stroke-width="4" stroke-linecap="round"/>
      <circle cx="304" cy="287" r="7" fill="#103847"/>
      <circle cx="350" cy="287" r="7" fill="#ef8c4d"/>
      <circle cx="390" cy="287" r="7" fill="#7ea797"/>
    </g>

    <g transform="rotate(-2 170 385)">
      <rect x="86" y="344" width="208" height="118" rx="18" fill="url(#card)"/>
      <rect x="86" y="344" width="208" height="118" rx="18" fill="none" stroke="#d2c0a8" stroke-width="2"/>
      <rect x="104" y="362" width="76" height="18" rx="9" fill="#113947"/>
      <text x="104" y="402" fill="#163842" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700">Workflow</text>
      <text x="104" y="430" fill="#4d6660" font-family="'Courier New', monospace" font-size="17">prompt -> tool -> reflect</text>
    </g>

    <g transform="translate(328 106)">
      <circle cx="68" cy="66" r="52" fill="#173f4b"/>
      <circle cx="68" cy="66" r="33" fill="none" stroke="#f7f1e8" stroke-width="6"/>
      <line x1="105" y1="103" x2="140" y2="138" stroke="#173f4b" stroke-width="12" stroke-linecap="round"/>
      <circle cx="68" cy="66" r="8" fill="#ef8c4d"/>
    </g>
  </g>
</svg>
