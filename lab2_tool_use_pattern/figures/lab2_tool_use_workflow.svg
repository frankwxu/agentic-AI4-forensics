<svg xmlns="http://www.w3.org/2000/svg" width="1540" height="360" viewBox="30 24 1540 360" role="img" aria-labelledby="title desc">
  <title id="title">Tool Use Pattern Workflow</title>
  <desc id="desc">Workflow for the Tool Use Pattern: mobile evidence package, date and file filtering, tool calls, metadata and vehicle checking, and a conclusion about online-sale preparation.</desc>

  <defs>
    <style>
      .title { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .node-title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #0b1324; }
      .node-text { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .label { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="410" fill="#ffffff"/>
  <text x="800" y="66" text-anchor="middle" class="title">Tool Use Pattern Workflow</text>

  <rect x="40" y="140" rx="16" ry="16" width="260" height="150" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="170" y="178" text-anchor="middle" class="node-title">[Instructor] Mobile</text>
  <text x="170" y="206" text-anchor="middle" class="node-title">Evidence Package</text>
  <text x="170" y="240" text-anchor="middle" class="node-text">photos and</text>
  <text x="170" y="264" text-anchor="middle" class="node-text">listing records</text>

  <rect x="355" y="140" rx="16" ry="16" width="260" height="150" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
  <text x="485" y="178" text-anchor="middle" class="node-title">[Student] Date and</text>
  <text x="485" y="206" text-anchor="middle" class="node-title">File Filtering</text>
  <text x="485" y="240" text-anchor="middle" class="node-text">photos and records</text>
  <text x="485" y="264" text-anchor="middle" class="node-text">on or after Jan 2</text>

  <rect x="670" y="140" rx="16" ry="16" width="260" height="150" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="800" y="178" text-anchor="middle" class="node-title">[Student+Agent] Tool</text>
  <text x="800" y="206" text-anchor="middle" class="node-title">Calls</text>
  <text x="800" y="240" text-anchor="middle" class="node-text">extract metadata and</text>
  <text x="800" y="264" text-anchor="middle" class="node-text">detect vehicle traits</text>

  <rect x="985" y="140" rx="16" ry="16" width="260" height="150" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="1115" y="178" text-anchor="middle" class="node-title">[Agent] Metadata +</text>
  <text x="1115" y="206" text-anchor="middle" class="node-title">Vehicle Check</text>
  <text x="1115" y="240" text-anchor="middle" class="node-text">match timestamps and</text>
  <text x="1115" y="264" text-anchor="middle" class="node-text">listing evidence</text>

  <rect x="1300" y="140" rx="16" ry="16" width="260" height="150" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <text x="1430" y="178" text-anchor="middle" class="node-title">[Student] Online-Sale</text>
  <text x="1430" y="206" text-anchor="middle" class="node-title">Conclusion</text>
  <text x="1430" y="240" text-anchor="middle" class="node-text">confirmed / likely /</text>
  <text x="1430" y="264" text-anchor="middle" class="node-text">unconfirmed evidence</text>

  <line x1="300" y1="215" x2="355" y2="215" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="615" y1="215" x2="670" y2="215" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="930" y1="215" x2="985" y2="215" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1245" y1="215" x2="1300" y2="215" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 1115 290 C 1115 340, 485 340, 485 290" fill="none" stroke="#1d4ed8" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="800" y="370" text-anchor="middle" class="label">Iterate until timestamp and vehicle evidence support one conclusion</text>
</svg>
